name: Build AURA8 APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3

      # Signature fixe : toutes les versions partagent la meme cle.
      # => les futures mises a jour s'installent SANS desinstaller.
      - name: Cle debug fixe
        run: |
          mkdir -p ~/.android
          cp debug.keystore ~/.android/debug.keystore
          echo "Cle debug fixe en place."

      - run: npm install

      # FIX CRASH #2 : sous Capacitor, webView.getEngine() peut renvoyer null
      # => on rend l'appel non-bloquant (sinon plantage ~2s apres l'ouverture).
      - name: Securiser le plugin (getEngine null-safe)
        run: |
          PJ=node_modules/@globules-io/cordova-plugin-background-mode/src/android/BackgroundMode.java
          perl -0pi -e 's{View view = webView\.getEngine\(\)\.getView\(\);}{View view; try { view = webView.getEngine().getView(); } catch (Throwable __t) { Log.e(TAG, "wv-opt skipped: " + __t); return; } if (view == null) return;}s' "$PJ"
          echo "garde getView ajoutee : $(grep -c 'wv-opt skipped' "$PJ") (doit etre 1)"

      - run: npx cap add android
      - run: npx cap sync android

      # FIX CRASH #1 : le plugin oublie de declarer son service ET son
      # foregroundServiceType. On repare le manifeste (sinon crash Android 14).
      - name: Declarer le service arriere-plan (fix crash Android 14)
        run: |
          MF=android/app/src/main/AndroidManifest.xml
          perl -0pi -e 's{</application>}{        <service android:name="io.globules.cordova.plugin.ForegroundService" android:exported="false" android:foregroundServiceType="specialUse">\n            <property android:name="android.app.PROPERTY_SPECIAL_USE_FGS_SUBTYPE" android:value="keeps the AURA8 trading bot running while the screen is off" />\n        </service>\n    </application>}s unless /ForegroundService/' "$MF"
          perl -0pi -e 's{<application}{<uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n    <application}s unless /POST_NOTIFICATIONS/' "$MF"
          echo "--- verif manifeste ---"
          echo "ForegroundService : $(grep -c ForegroundService "$MF")"
          echo "POST_NOTIFICATIONS: $(grep -c POST_NOTIFICATIONS "$MF")"
          echo "specialUse        : $(grep -c specialUse "$MF")"

      - name: Build APK debug
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: aura8-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
